<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="noindex">

  <title>Redirecting… — Neil Kodner</title>

  <!-- Albums now live at pretty URLs: /photography/<cat>/<album>/ .
       This page preserves old /album.html?cat=&album= links (and any #photo
       hash) by redirecting before render. The slug() below MUST match
       slugify() in js/app.js and scripts/build_seo.py. -->
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var cat = p.get('cat'), album = p.get('album');
      function slug(s) {
        return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
      }
      if (cat && album) {
        location.replace('/photography/' + slug(cat) + '/' + slug(album) + '/' + location.hash);
      }
    })();
  </script>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preload" href="/fonts/space-grotesk-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main id="main-content" class="not-found">
    <div class="not-found-inner">
      <h1>Redirecting…</h1>
      <p>If you are not redirected, browse the <a href="/photography/">photography</a>.</p>
    </div>
  </main>
</body>
</html>
